<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview Dokumen</title>
  <link rel="icon" href="/asset/TitleE-bphtb.png" type="image/png">
  <style>
    body { margin:0; background:#111; color:#eee; font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 14px; background:#1f2937; position:sticky; top:0; z-index:10; }
    header .title { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    header .meta { opacity:.8; font-size:12px; }
    main { height: calc(100vh - 52px); }
    iframe { width:100%; height:100%; border:none; background:#222; }
    a.btn { color:#93c5fd; text-decoration:none; font-size:12px; }
  </style>
  <script>
    function getParam(name){ const u=new URL(window.location.href); return u.searchParams.get(name) || ''; }
    function build(){
      const src = getParam('src');
      const title = getParam('title') || 'Preview Dokumen';
      const page = getParam('page') || '1';
      const zoom = getParam('zoom') || '125';
      document.title = title;
      document.getElementById('title').textContent = title;
      document.getElementById('meta').textContent = 'Halaman '+page+' | Zoom '+zoom+'%';
      const bust = (src.indexOf('?') === -1 ? '?v=' : '&v=') + Date.now();
      const full = src + bust + '#page=' + encodeURIComponent(page) + '&zoom=' + encodeURIComponent(zoom);
      document.getElementById('frame').src = full;
      document.getElementById('openRaw').href = src + bust;
    }
    window.addEventListener('DOMContentLoaded', build);
  </script>
  </head>
  <body>
    <header>
      <div class="title" id="title">Preview Dokumen</div>
      <div class="meta" id="meta"></div>
      <a id="openRaw" class="btn" target="_blank" rel="noreferrer noopener">Buka File Asli</a>
    </header>
    <main>
      <iframe id="frame" title="PDF Preview"></iframe>
    </main>
  </body>
  </html>
