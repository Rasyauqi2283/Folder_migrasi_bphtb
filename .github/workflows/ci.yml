name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend-go:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: E-BPHTB_MIgration/backend/go.mod
          cache: true

      - name: Test
        working-directory: E-BPHTB_MIgration/backend
        run: go test ./...

  frontend-next:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: E-BPHTB_MIgration/frontend-next/package-lock.json

      - name: Install
        working-directory: E-BPHTB_MIgration/frontend-next
        run: npm ci

      - name: Build
        working-directory: E-BPHTB_MIgration/frontend-next
        run: npm run build

