<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dashboard Notifikasi & Status PPAT</title>
<style>
  :root{
    --bg: #e8f3fb;            /* cloud blue */
    --panel: #ffffff;
    --accent: #4a90e2;        /* primary blue */
    --muted: #8b98a8;
    --card-shadow: 0 8px 22px rgba(20,30,50,0.08);
    --radius: 14px;
    --danger: #d9534f;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: Inter, "Segoe UI", Arial, sans-serif;
    background: linear-gradient(180deg, #eef6ff 0%, #e6f1fb 100%);
    color:#1f3246;
    padding:28px;
  }

  /* Layout: left content + right sidebar */
  .main-layout{
    max-width:1200px;
    margin:0 auto;
    display:grid;
    grid-template-columns: 1fr 360px;
    gap:20px;
    align-items:start;
  }

  /* Card base */
  .card{
    background:var(--panel);
    border-radius:var(--radius);
    box-shadow:var(--card-shadow);
    padding:18px;
  }

  /* ========== NOTIFICATIONS PANEL ========== */
  .notifications-panel .panel-header{
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:space-between;
    margin-bottom:12px;
  }
  .title {font-size:20px; font-weight:700; color:var(--accent);}

  /* segmented buttons */
  .segmented {
    display:flex;
    gap:8px;
    background:transparent;
  }
  .segmented button{
    border:1px solid rgba(74,144,226,0.18);
    background:#fff;
    color:var(--accent);
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    font-weight:600;
    box-shadow: none;
    transition:all .18s;
  }
  .segmented button[aria-pressed="true"]{
    background: linear-gradient(180deg,var(--accent), #357ab7);
    color:#fff;
    box-shadow: 0 6px 16px rgba(74,144,226,0.18);
  }

  .panel-controls{
    display:flex;
    gap:10px;
    align-items:center;
  }
  .search {
    display:flex;
    align-items:center;
    gap:8px;
    background:#f6fbff;
    border:1px solid rgba(74,144,226,0.1);
    padding:8px 10px;
    border-radius:999px;
    min-width:260px;
  }
  .search input{
    border:none; background:transparent; outline:none; width:100%;
    font-size:14px;
  }

  /* table */
  .table-wrap{
    margin-top:12px;
    overflow:auto;
    border-radius:12px;
    border:1px solid rgba(20,30,50,0.06);
  }
  table.data-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    min-width:880px; /* allow horizontal scroll on small widths */
  }
  table.data-table thead th{
    background: linear-gradient(180deg, rgba(74,144,226,0.95), #357ab7);
    color:#fff;
    font-weight:700;
    padding:12px 14px;
    text-align:left;
    position:sticky;
    top:0;
    z-index:2;
  }
  table.data-table tbody td{
    padding:12px 14px;
    border-bottom:1px solid rgba(20,30,50,0.04);
    background: #fff;
  }
  table.data-table tbody tr:hover td{
    background: #f4f9ff;
  }
  /* pill statuses */
  .pill {
    display:inline-block;
    padding:6px 10px;
    border-radius:999px;
    font-weight:600;
    font-size:13px;
  }
  .pill.read { background:#e6f7ff; color:var(--accent); border:1px solid rgba(74,144,226,0.12); }
  .pill.unread { background:#fff1d6; color:#b86b00; border:1px solid rgba(184,107,0,0.08); }

  /* small action btn */
  .btn-sm {
    padding:6px 10px; border-radius:10px; font-weight:700; border:none; cursor:pointer;
    background:var(--accent); color:#fff;
  }

  /* ========== STATUS SIDEBAR ========== */
  .status-panel .header{
    display:flex; gap:10px; align-items:center; justify-content:space-between;
    margin-bottom:10px;
  }
  .status-panel h3{ margin:0; color:var(--accent); }
  .status-filter{ display:flex; gap:8px; align-items:center; margin-bottom:12px; }
  .status-filter select,
  .status-filter input {
    padding:8px 10px; border-radius:10px; border:1px solid rgba(20,30,50,0.06);
    background:#fff; outline:none;
  }
  .status-table{ width:100%; border-collapse:collapse; font-size:14px; }
  .status-table th{ text-align:left; font-weight:700; color:#516076; padding:8px 6px; }
  .status-table td{ padding:10px 6px; border-bottom:1px solid rgba(20,30,50,0.04); }
  .status-badge{
    display:inline-block; padding:6px 10px; border-radius:999px; font-weight:700;
    font-size:13px;
  }
  .status-badge.active{ background:#e6fbf0; color:#17965b; border:1px solid rgba(23,150,91,0.08); }
  .status-badge.nonaktif{ background:#fff0f0; color:#d04a4a; }
  .status-badge.pindah{ background:#fff6e6; color:#b86b00; }
  .status-badge.meninggal{ background:#f4f5f7; color:#686b70; border:1px solid rgba(0,0,0,0.03); }

  /* responsive */
  @media (max-width:1100px){
    .main-layout{ grid-template-columns: 1fr; }
    .notifications-panel{ order:1 }
    .status-panel{ order:2 }
    .search{ min-width:160px; }
  }

</style>
</head>
<body>

<main class="main-layout">
  <!-- Notifications panel -->
  <section class="card notifications-panel" aria-labelledby="notifTitle">
    <div class="panel-header">
      <div class="title" id="notifTitle">Gudang Notifikasi</div>

      <div class="panel-controls">
        <div class="segmented" role="tablist" aria-label="Kategori Notifikasi">
          <button class="seg-btn" data-cat="ppat_ltb" aria-pressed="true">PPAT → LTB</button>
          <button class="seg-btn" data-cat="ltb_lsb" aria-pressed="false">LTB → LSB</button>
          <button class="seg-btn" data-cat="lsb_ppat" aria-pressed="false">LSB → PPAT</button>
        </div>

        <div class="search" role="search" aria-label="Cari notifikasi">
          <svg width="16" height="16" fill="#4a90e2" viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35"></path></svg>
          <input id="notifSearch" placeholder="Cari NoBooking / UserID / WP..." />
          <button id="clearSearch" title="Clear" style="background:none;border:none;color:var(--muted);cursor:pointer">✕</button>
        </div>
      </div>
    </div>

    <div class="table-wrap" aria-live="polite">
      <table class="data-table" id="notifTable" role="table" aria-label="Tabel Notifikasi">
        <thead>
          <tr id="tableHeaders">
            <th>No. Registrasi</th>
            <th>NoBooking</th>
            <th>UserID</th>
            <th>Special Field</th>
            <th>PPATK Khusus</th>
            <th>NOPPBB</th>
            <th>Jenis WP</th>
            <th>Updated</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="notifBody">
          <!-- diisi oleh JS -->
        </tbody>
      </table>
    </div>
  </section>

  <!-- Status PPAT sidebar -->
  <aside class="card status-panel" aria-labelledby="statusTitle">
    <div class="header">
      <h3 id="statusTitle">Status PPAT</h3>
      <div style="font-size:13px;color:var(--muted)">Divisi: PPAT</div>
    </div>

    <div class="status-filter">
      <select id="statusSelect" aria-label="Filter status">
        <option value="">Semua status</option>
        <option value="Aktif">Aktif</option>
        <option value="Nonaktif">Nonaktif</option>
        <option value="Pindah Kerja">Pindah Kerja</option>
        <option value="Meninggal">Meninggal</option>
      </select>
      <input id="statusSearch" placeholder="Cari nama / userid" />
    </div>

    <div style="max-height:520px; overflow:auto;">
      <table class="status-table" role="table" aria-label="Tabel Status PPAT">
        <thead>
          <tr><th>Nama</th><th>Status</th></tr>
        </thead>
        <tbody id="statusBody">
          <!-- diisi JS -->
        </tbody>
      </table>
    </div>
  </aside>
  <section>
    <h3>Status User PPAT/PPATS</h3>
    <div style="margin:8px 0; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
      <label>Filter status:</label>
      <select id="userStatusFilter">
        <option value="">Semua</option>
        <option value="aktif">Aktif</option>
        <option value="non-aktif">Nonaktif</option>
        <option value="meninggal">Meninggal</option>
        <option value="suspend">Suspend</option>
      </select>
      <input type="text" id="userSearch" placeholder="Cari nama, userid, email..." style="padding:4px 8px; border:1px solid #ccc; border-radius:4px; min-width:200px;">
      <button id="reloadUsers">Muat Ulang</button>
    </div>
    <div class="table-responsive">
      <table class="excel-table gothic-table" id="userTable">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Userid</th>
            <th>Divisi</th>
            <th>Status</th>
            <th>PPATK Khusus</th>
            <th>Spesial</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

<script>
/* ---------- sample data (ganti dengan fetch berdasar backend) ---------- */

// Sample data removed - now using real data from database via backend API

/* ---------- state ---------- */
let currentCategory = 'ppat_ltb'; // default
const segButtons = document.querySelectorAll('.segmented .seg-btn');
const notifBody = document.getElementById('notifBody');

// Function to update table headers based on category
function updateTableHeaders(category) {
  const tableHeaders = document.getElementById('tableHeaders');
  if (!tableHeaders) return;
  
  let headers = [];
  
  if (category === 'ppat_ltb') {
    headers = [
      'No. Registrasi', 'NoBooking', 'UserID', 'Special Field', 
      'PPATK Khusus', 'NOPPBB', 'Jenis WP', 'Updated', 'Aksi'
    ];
  } else if (category === 'ltb_lsb') {
    headers = [
      'No. Registrasi', 'NoBooking', 'UserID', 'Special Field', 
      'PPATK Khusus', 'NOPPBB', 'Jenis WP', 'Status Peneliti', 'Updated', 'Aksi'
    ];
  } else if (category === 'lsb_ppat') {
    headers = [
      'No. Registrasi', 'NoBooking', 'UserID', 'Special Field', 
      'PPATK Khusus', 'NOPPBB', 'Jenis WP', 'Updated', 'Aksi'
    ];
  }
  
  // Clear existing headers
  tableHeaders.innerHTML = '';
  
  // Add new headers
  headers.forEach(headerText => {
    const th = document.createElement('th');
    th.textContent = headerText;
    tableHeaders.appendChild(th);
  });
  
  console.log(`✅ Updated table headers for category: ${category}`);
}
const notifSearch = document.getElementById('notifSearch');
const clearSearch = document.getElementById('clearSearch');

function renderNotifications(){
  // For PPAT → LTB, use backend data loaded by loadNotifications()
  if (currentCategory === 'ppat_ltb') {
    // Data is already loaded by loadNotifications() function
    return;
  }
  
  // For other categories, use sample data
  const rows = [];
  const q = (notifSearch.value || '').trim().toLowerCase();
  const list = notificationsData[currentCategory] || [];
  for(const it of list){
    // simple search across a few fields
    if(q){
      const hay = (it.nobooking+' '+it.userid+' '+it.special_field+' '+it.noppbb).toLowerCase();
      if(!hay.includes(q)) continue;
    }
    rows.push(`
      <tr>
        <td>${it.nobooking}</td>
        <td>${it.userid}</td>
        <td>${it.special_field}</td>
        <td>${it.ppatk_khusus}</td>
        <td>${it.noppbb}</td>
        <td>${it.jenis_wajib_pajak}</td>
        <td>${it.updated}</td>
        <td><button class="btn-sm" data-nobook="${it.nobooking}">Lihat</button></td>
      </tr>
    `);
  }
  notifBody.innerHTML = rows.length ? rows.join('') : `<tr><td colspan="8" style="padding:28px;text-align:center;color:var(--muted)">Tidak ada notifikasi pada kategori ini.</td></tr>`;
}

/* segmented control interactions */
segButtons.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    segButtons.forEach(b=> b.setAttribute('aria-pressed','false'));
    btn.setAttribute('aria-pressed','true');
    currentCategory = btn.dataset.cat;
    
    // Update table headers based on category
    updateTableHeaders(currentCategory);
    
    // Load notifications from backend for all categories
    loadNotifications();
  });
});

/* search */
notifSearch.addEventListener('input', ()=> {
  loadNotifications();
});
clearSearch.addEventListener('click', ()=>{ 
  notifSearch.value=''; 
  loadNotifications();
});

/* Lihat button (delegation) */
document.getElementById('notifTable').addEventListener('click', async (e)=>{
  const b = e.target.closest('button[data-nobook]');
  if(!b) return;
  
  const nb = b.dataset.nobook;
  const noRegistrasi = b.dataset.noRegistrasi;
  
  console.log('🔍 Opening detail for:', { nobooking: nb, noRegistrasi });
  
  if (currentCategory === 'ppat_ltb' && noRegistrasi) {
    try {
      // Fetch detail from backend
      const js = await fetchJSON(`/api/admin/notification-warehouse/ppat-ltb/${noRegistrasi}`);
      const data = js.data;
      
      // Show detail modal
      showNotificationDetail(data);
    } catch (error) {
      console.error('❌ Error fetching notification detail:', error);
      alert('Gagal mengambil detail notifikasi: ' + error.message);
    }
  } else {
    // Fallback for other categories or missing noRegistrasi
  alert('Open detail/preview untuk ' + nb + '  (integrasikan modal / viewPDF backend)');
  }
});

// Function to show notification detail modal
function showNotificationDetail(data) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-content" style="max-width: 600px; max-height: 80vh; overflow-y: auto;">
      <div class="modal-header">
        <h3>Detail Notifikasi PPAT → LTB</h3>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="detail-grid">
          <div class="detail-item">
            <label>No. Registrasi:</label>
            <span>${data.no_registrasi || '-'}</span>
          </div>
          <div class="detail-item">
            <label>No. Booking:</label>
            <span>${data.nobooking || '-'}</span>
          </div>
          <div class="detail-item">
            <label>User ID:</label>
            <span>${data.userid || '-'}</span>
          </div>
          <div class="detail-item">
            <label>Nama PPAT:</label>
            <span>${data.ppat_nama || '-'}</span>
          </div>
          <div class="detail-item">
            <label>Divisi PPAT:</label>
            <span>${data.ppat_divisi || '-'}</span>
          </div>
          <div class="detail-item">
            <label>PPATK Khusus:</label>
            <span>${data.ppatk_khusus || '-'}</span>
          </div>
          <div class="detail-item">
            <label>Special Field:</label>
            <span>${data.special_field || '-'}</span>
          </div>
          <div class="detail-item">
            <label>Jenis Wajib Pajak:</label>
            <span>${data.jenis_wajib_pajak || '-'}</span>
          </div>
          <div class="detail-item">
            <label>No. PPBB:</label>
            <span>${data.noppbb || '-'}</span>
          </div>
          <div class="detail-item">
            <label>Status LTB:</label>
            <span class="status-badge status-${data.ltb_status?.toLowerCase() || 'unknown'}">${data.ltb_status || '-'}</span>
          </div>
          <div class="detail-item">
            <label>Track Status:</label>
            <span class="status-badge status-${data.ltb_trackstatus?.toLowerCase() || 'unknown'}">${data.ltb_trackstatus || '-'}</span>
          </div>
          <div class="detail-item">
            <label>Pengirim LTB:</label>
            <span>${data.ltb_pengirim || '-'}</span>
          </div>
          <div class="detail-item">
            <label>Catatan LTB:</label>
            <span>${data.ltb_catatan || '-'}</span>
          </div>
          <div class="detail-item">
            <label>Diupdate:</label>
            <span>${data.updated_at ? new Date(data.updated_at).toLocaleString('id-ID') : '-'}</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Tutup</button>
        <button class="btn btn-primary" onclick="viewBookingDocuments('${data.no_registrasi}')">Lihat Dokumen</button>
      </div>
    </div>
  `;
  
  // Add modal styles if not exists
  if (!document.getElementById('modal-styles')) {
    const style = document.createElement('style');
    style.id = 'modal-styles';
    style.textContent = `
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }
      .modal-content {
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        width: 90%;
        max-width: 600px;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        border-bottom: 1px solid #eee;
      }
      .modal-header h3 {
        margin: 0;
        color: #333;
      }
      .modal-close {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #999;
      }
      .modal-body {
        padding: 20px;
      }
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .detail-item {
        display: flex;
        flex-direction: column;
      }
      .detail-item label {
        font-weight: bold;
        color: #666;
        margin-bottom: 5px;
        font-size: 12px;
        text-transform: uppercase;
      }
      .detail-item span {
        color: #333;
        font-size: 14px;
      }
      .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .status-diolah { background: #e3f2fd; color: #1976d2; }
      .status-diterima { background: #e8f5e8; color: #2e7d32; }
      .status-dilanjutkan { background: #fff3e0; color: #f57c00; }
      .status-unknown { background: #f5f5f5; color: #666; }
      .modal-footer {
        padding: 20px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .btn-primary {
        background: #007bff;
        color: white;
      }
      .btn-secondary {
        background: #6c757d;
        color: white;
      }
    `;
    document.head.appendChild(style);
  }
  
  document.body.appendChild(modal);
  
  // Close on overlay click
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.remove();
    }
  });
}

// Function to view booking documents
function viewBookingDocuments(noRegistrasi) {
  console.log('🔍 Viewing documents for no_registrasi:', noRegistrasi);
  // TODO: Implement document viewer
  alert('Fitur lihat dokumen akan diimplementasikan untuk no_registrasi: ' + noRegistrasi);
}

/* ---------- STATUS PANEL ---------- */
const statusBody = document.getElementById('statusBody');
const statusSelect = document.getElementById('statusSelect');
const statusSearch = document.getElementById('statusSearch');

async function renderStatus(){
  try {
    console.log('🔍 Loading PPAT status data from backend...');
    
    // Show loading indicator
    statusBody.innerHTML = '<tr><td colspan="2" style="padding:18px;text-align:center;color:var(--muted)">Loading...</td></tr>';
    
  const q = (statusSearch.value || '').trim().toLowerCase();
  const filter = statusSelect.value;
    
    // Fetch PPAT users data from backend
    let url = '/api/admin/notification-warehouse/ppat-users?page=1&limit=50';
    if (filter) {
      // Map filter values to backend status values
      const statusMap = {
        'Aktif': 'aktif',
        'Nonaktif': 'non-aktif',
        'Pindah Kerja': 'pindah-kerja',
        'Meninggal': 'meninggal'
      };
      const backendStatus = statusMap[filter] || filter;
      url += `&status=${encodeURIComponent(backendStatus)}`;
    }
    if (q) {
      url += `&search=${encodeURIComponent(q)}`;
    }
    
    console.log('🔍 Fetching PPAT status from URL:', url);
    const js = await fetchJSON(url);
    
    const users = js.data || [];
    const ppatUsers = users.filter(u => u.divisi === 'PPAT'); // Filter only PPAT users
    
    if (!ppatUsers.length) {
      statusBody.innerHTML = `<tr><td colspan="2" style="padding:18px;text-align:center;color:var(--muted)">Tidak ada data PPAT ditemukan.</td></tr>`;
      return;
    }
    
    const rows = [];
    for (const u of ppatUsers) {
      const badgeClass = u.status === 'Aktif' ? 'active' : 
                        (u.status === 'Nonaktif' ? 'nonaktif' : 
                        (u.status === 'Pindah Kerja' ? 'pindah' : 'meninggal'));
      
    rows.push(`
      <tr>
        <td>
            <div style="font-weight:700">${u.nama || '-'}</div>
            <div style="font-size:13px;color:var(--muted)">${u.userid || '-'} • ${u.special_field || '-'}</div>
        </td>
        <td style="text-align:right">
            <span class="status-badge ${badgeClass}">${u.status || '-'}</span>
        </td>
      </tr>
    `);
  }
    
    statusBody.innerHTML = rows.length ? rows.join('') : `<tr><td colspan="2" style="padding:18px;text-align:center;color:var(--muted)">Tidak ada data PPAT.</td></tr>`;
    
    console.log(`✅ Loaded ${ppatUsers.length} PPAT users in status panel`);
    
  } catch (e) {
    console.error('❌ Error loading PPAT status:', e);
    statusBody.innerHTML = `<tr><td colspan="2" style="padding:18px;text-align:center;color:var(--muted)">Gagal memuat data: ${e.message}</td></tr>`;
  }
}

statusSelect.addEventListener('change', () => renderStatus());
statusSearch.addEventListener('input', () => renderStatus());

/* init */
updateTableHeaders(currentCategory); // Initialize table headers
renderNotifications();
renderStatus();
</script>

<script>
  (function(){
    const qs = (s, r=document)=>r.querySelector(s);
    const qsa = (s, r=document)=>Array.from(r.querySelectorAll(s));

    async function fetchJSON(url){
      const res = await fetch(url, { credentials:'include' });
      const js = await res.json().catch(()=>({ success:false }));
      if(!res.ok) throw new Error(js.message||('HTTP '+res.status));
      return js;
    }

    async function loadNotifications(){
      try{
        console.log('🔍 Loading notifications for category:', currentCategory);
        
        const tbody = qs('#notifTable tbody');
        
        // Show loading indicator
        tbody.innerHTML = '<tr><td colspan="8" style="padding:28px;text-align:center;color:var(--muted)">Loading...</td></tr>';
        
        let url = '';
        let expectedCols = 9;
        
        if (currentCategory === 'ppat_ltb') {
          const search = (notifSearch.value || '').trim();
          url = `/api/admin/notification-warehouse/ppat-ltb?page=1&limit=50${search ? `&search=${encodeURIComponent(search)}` : ''}`;
        } else if (currentCategory === 'ltb_lsb') {
          const search = (notifSearch.value || '').trim();
          url = `/api/admin/notification-warehouse/ltb-lsb?page=1&limit=50${search ? `&search=${encodeURIComponent(search)}` : ''}`;
          expectedCols = 10; // Additional column for peneliti workflow
        } else if (currentCategory === 'lsb_ppat') {
          const search = (notifSearch.value || '').trim();
          url = `/api/admin/notification-warehouse/lsb-ppat?page=1&limit=50${search ? `&search=${encodeURIComponent(search)}` : ''}`;
          expectedCols = 9;
        } else {
          // For other categories, use sample data for now
          url = '/api/admin/status-ppat/notifications?page=1&limit=50';
        }
        
        console.log('🔍 Fetching from URL:', url);
        const js = await fetchJSON(url);
        tbody.innerHTML='';
        
        const rows = js.data || [];
        
        if(!rows.length){
          const tr = tbody.insertRow(); 
          const td = tr.insertCell(); 
          td.colSpan = expectedCols;
          let message = '';
          if (currentCategory === 'ppat_ltb') {
            message = 'Tidak ada notifikasi PPAT → LTB dengan status "Diolah"';
          } else if (currentCategory === 'ltb_lsb') {
            message = 'Tidak ada notifikasi LTB → LSB dengan alur peneliti';
          } else if (currentCategory === 'lsb_ppat') {
            message = 'Tidak ada notifikasi LSB → PPAT dengan status "Terselesaikan"';
          } else {
            message = 'Tidak ada Data masuk, 0 to 0 Data Pages';
          }
          td.textContent = message;
          return;
        }
        
        rows.forEach(r=>{
          const tr = tbody.insertRow();
          let vals = [];
          
          if (currentCategory === 'ppat_ltb') {
            vals = [
              r.no_registrasi||'-',
              r.nobooking||'-',
              r.userid||'-',
              r.special_field||'-',
              r.ppatk_khusus||'-',
              r.noppbb||'-',
              r.jenis_wajib_pajak||'-',
              r.updated||r.updated_at||'-',
              'Detail'
            ];
          } else if (currentCategory === 'ltb_lsb') {
            // Show peneliti workflow status
            const penelitiStatus = r.peneliti_verifikasi_status || r.peneliti_paraf_status || r.peneliti_validasi_status || 'Belum diproses';
            vals = [
              r.no_registrasi||'-',
              r.nobooking||'-',
              r.userid||'-',
              r.special_field||'-',
              r.ppatk_khusus||'-',
              r.noppbb||'-',
              r.jenis_wajib_pajak||'-',
              penelitiStatus,
              r.updated||r.updated_at||'-',
              'Detail'
            ];
          } else if (currentCategory === 'lsb_ppat') {
            vals = [
              r.no_registrasi||'-',
              r.nobooking||'-',
              r.userid||'-',
              r.special_field||'-',
              r.ppatk_khusus||'-',
              r.noppbb||'-',
              r.jenis_wajib_pajak||'-',
              r.updated||r.updated_at||'-',
              'Detail'
            ];
          }
          
          vals.forEach((v,idx)=>{ 
            const td = tr.insertCell(); 
            td.textContent = v; 
            if(idx === vals.length - 1){ // Last column is action button
              td.innerHTML = `<button class="btn-sm" data-no-registrasi="${r.no_registrasi||''}" data-nobook="${r.nobooking||''}">Lihat</button>`; 
            }
          });
        });
        
        console.log(`✅ Loaded ${rows.length} notifications for ${currentCategory}`);
      }catch(e){
        console.error('❌ Error loading notifications:', e);
        const tbody = qs('#notifTable tbody');
        tbody.innerHTML='';
        const tr = tbody.insertRow(); 
        const td = tr.insertCell(); 
        td.colSpan = expectedCols || 9; 
        td.textContent='Gagal memuat data: '+e.message;
      }
    }

    async function loadUsers(){
      try{
        console.log('🔍 Loading PPAT/PPATS users from backend...');
        
        const tbody = qs('#userTable tbody');
        
        // Show loading indicator
        tbody.innerHTML = '<tr><td colspan="6" style="padding:28px;text-align:center;color:var(--muted)">Loading...</td></tr>';
        
        const status = (qs('#userStatusFilter').value||'').trim();
        const search = (qs('#userSearch').value||'').trim();
        
        let url = '/api/admin/notification-warehouse/ppat-users?page=1&limit=50';
        if (status) url += `&status=${encodeURIComponent(status)}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        
        console.log('🔍 Fetching PPAT users from URL:', url);
        const js = await fetchJSON(url);
        tbody.innerHTML='';
        
        const rows = js.data || [];
        
        if(!rows.length){
          const tr = tbody.insertRow(); 
          const td = tr.insertCell(); 
          td.colSpan=6; 
          td.textContent = 'Tidak ada data pengguna PPAT/PPATS ditemukan'; 
          return;
        }
        
        rows.forEach(r=>{
          const tr = tbody.insertRow();
          const vals = [r.nama||'-', r.userid||'-', r.divisi||'-', r.status||'-', r.ppatk_khusus||'-', r.special_field||'-'];
          vals.forEach((v,idx)=>{ 
            const td = tr.insertCell(); 
            td.textContent = v; 
            if(idx===5){ 
              td.innerHTML = `<button class="btn-sm" data-userid="${r.userid||''}" data-user-id="${r.id||''}">Edit</button>`; 
            }
          });
        });
        
        console.log(`✅ Loaded ${rows.length} PPAT/PPATS users from backend`);
      }catch(e){
        console.error('❌ Error loading PPAT users:', e);
        const tbody = qs('#userTable tbody');
        tbody.innerHTML='';
        const tr = tbody.insertRow(); 
        const td = tr.insertCell(); 
        td.colSpan=6; 
        td.textContent='Gagal memuat data: '+e.message;
      }
    }

    document.addEventListener('DOMContentLoaded', ()=>{
      loadNotifications();
      loadUsers();
      
      // Event handlers for users
      const reload = qs('#reloadUsers'); 
      if (reload) reload.addEventListener('click', loadUsers);
      
      const statusFilter = qs('#userStatusFilter'); 
      if (statusFilter) statusFilter.addEventListener('change', loadUsers);
      
      const userSearch = qs('#userSearch');
      if (userSearch) {
        let searchTimeout;
        userSearch.addEventListener('input', () => {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => {
            loadUsers();
          }, 500); // Debounce search
        });
      }
    });

    // Event handler for Edit button
    document.addEventListener('click', async (e) => {
      if (e.target.classList.contains('btn-sm') && e.target.textContent === 'Edit') {
        const userid = e.target.dataset.userid;
        const userId = e.target.dataset.userId;
        
        console.log('🔍 Edit button clicked for user:', { userid, userId });
        
        try {
          // Fetch user detail from backend
          const js = await fetchJSON(`/api/admin/notification-warehouse/ppat-users/${userid}`);
          const userData = js.data;
          
          // Show edit modal
          showUserEditModal(userData);
        } catch (error) {
          console.error('❌ Error fetching user detail:', error);
          alert('Gagal mengambil detail pengguna: ' + error.message);
        }
      }
    });

    // Function to show user edit modal
    function showUserEditModal(userData) {
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal-content" style="max-width: 500px;">
          <div class="modal-header">
            <h3>Edit Pengguna PPAT/PPATS</h3>
            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
          </div>
          <div class="modal-body">
            <form id="editUserForm">
              <div class="form-group">
                <label>Nama:</label>
                <input type="text" id="editNama" value="${userData.nama || ''}" class="form-control">
              </div>
              <div class="form-group">
                <label>User ID:</label>
                <input type="text" id="editUserid" value="${userData.userid || ''}" class="form-control" readonly>
              </div>
              <div class="form-group">
                <label>Divisi:</label>
                <select id="editDivisi" class="form-control">
                  <option value="PPAT" ${userData.divisi === 'PPAT' ? 'selected' : ''}>PPAT</option>
                  <option value="PPATS" ${userData.divisi === 'PPATS' ? 'selected' : ''}>PPATS</option>
                </select>
              </div>
              <div class="form-group">
                <label>Status PPAT:</label>
                <select id="editStatusPpat" class="form-control">
                  <option value="aktif" ${userData.status_ppat === 'aktif' ? 'selected' : ''}>Aktif</option>
                  <option value="non-aktif" ${userData.status_ppat === 'non-aktif' ? 'selected' : ''}>Nonaktif</option>
                  <option value="meninggal" ${userData.status_ppat === 'meninggal' ? 'selected' : ''}>Meninggal</option>
                  <option value="suspend" ${userData.status_ppat === 'suspend' ? 'selected' : ''}>Suspend</option>
                </select>
              </div>
              <div class="form-group">
                <label>PPATK Khusus:</label>
                <input type="text" id="editPpatkKhusus" value="${userData.ppatk_khusus || ''}" class="form-control">
              </div>
              <div class="form-group">
                <label>Special Field:</label>
                <textarea id="editSpecialField" class="form-control" rows="3">${userData.special_field || ''}</textarea>
              </div>
              <div class="form-group">
                <label>Email:</label>
                <input type="email" id="editEmail" value="${userData.email || ''}" class="form-control">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Batal</button>
            <button class="btn btn-primary" onclick="saveUserEdit('${userData.id}')">Simpan</button>
          </div>
        </div>
      `;
      
      // Add modal styles if not exists
      if (!document.getElementById('user-modal-styles')) {
        const style = document.createElement('style');
        style.id = 'user-modal-styles';
        style.textContent = `
          .form-group {
            margin-bottom: 15px;
          }
          .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
          }
          .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
          }
          .form-control:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
          }
          textarea.form-control {
            resize: vertical;
            min-height: 80px;
          }
        `;
        document.head.appendChild(style);
      }
      
      document.body.appendChild(modal);
      
      // Close on overlay click
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.remove();
        }
      });
    }

    // Function to save user edit
    window.saveUserEdit = async function(userId) {
      try {
        const formData = {
          nama: document.getElementById('editNama').value,
          divisi: document.getElementById('editDivisi').value,
          status_ppat: document.getElementById('editStatusPpat').value,
          ppatk_khusus: document.getElementById('editPpatkKhusus').value,
          special_field: document.getElementById('editSpecialField').value,
          email: document.getElementById('editEmail').value
        };

        console.log('🔍 Saving user edit:', { userId, formData });

        // TODO: Implement PUT endpoint for updating user
        // const response = await fetch(`/api/admin/notification-warehouse/ppat-users/${userId}`, {
        //   method: 'PUT',
        //   headers: { 'Content-Type': 'application/json' },
        //   body: JSON.stringify(formData),
        //   credentials: 'include'
        // });

        // For now, just show success message
        alert('Fitur edit pengguna akan segera diimplementasikan!');
        
        // Close modal
        document.querySelector('.modal-overlay').remove();
        
        // Reload users list
        loadUsers();
        
      } catch (error) {
        console.error('❌ Error saving user edit:', error);
        alert('Gagal menyimpan perubahan: ' + error.message);
      }
    };
  })();
  </script>
  <script type="module">
    import { initNotifications } from '/script-backend/notification-setup.js';
    initNotifications();
  </script>
</body>
