<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-BPHTB | Selamat Datang</title>
  <link rel="icon" href="asset/TitleE-bphtb.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
      background-attachment: fixed;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    header {
      width: 100%;
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(13, 27, 42, 0.95);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(65, 90, 119, 0.3);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .nav-buttons {
      display: flex;
      gap: 15px;
    }

    .nav-buttons button {
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .nav-buttons .register {
      background: linear-gradient(135deg, #415a77, #1b263b);
      color: #fff;
      box-shadow: 0 4px 15px rgba(65, 90, 119, 0.3);
    }
    .nav-buttons .register:hover {
      background: linear-gradient(135deg, #1b263b, #0d1b2a);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(65, 90, 119, 0.4);
    }

    .nav-buttons .login {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .nav-buttons .login:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.3);
    }

        /* Banner / Notice */
        .banner {
          margin-top: 80px;
      width: 90%;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
      padding: 40px;
      text-align: center;
      background: linear-gradient(135deg, rgba(27, 38, 59, 0.8), rgba(65, 90, 119, 0.6));
      border-radius: 20px;
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      animation: fadeInUp 0.7s ease forwards;
    }

    .banner h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .banner p {
      font-size: 1rem;
      color: #e2e8f0;
    }

    /* Hero Section */
    .hero {
      margin-top: 60px; /* supaya tidak ketutup navbar */
      width: 90%;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      flex-wrap: wrap;
      animation: fadeInUp 0.7s ease forwards;
    }

    .hero-text {
      flex: 1;
    }
    .hero-text h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.2;
    }
    .hero-text p {
      font-size: 1.1rem;
      color: #e2e8f0;
      margin-bottom: 25px;
    }
    .hero-text .cta {
      padding: 15px 30px;
      background: linear-gradient(135deg, #415a77, #1b263b);
      color: #fff;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(65, 90, 119, 0.3);
      font-size: 1rem;
    }
    .hero-text .cta:hover {
      background: linear-gradient(135deg, #1b263b, #0d1b2a);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(65, 90, 119, 0.4);
    }

    .hero img {
      flex: 1;
      max-width: 500px;
      width: 100%;
      height: auto;
    }

    /* Footer */
    footer {
      margin-top: auto;
      padding: 25px;
      text-align: center;
      font-size: 0.9rem;
      background: rgba(13, 27, 42, 0.8);
      border-top: 1px solid rgba(65, 90, 119, 0.3);
      backdrop-filter: blur(10px);
    }

    /* Animasi */
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        padding: 15px 25px;
      }
      .logo {
        font-size: 1.2rem;
      }
      .hero {
        flex-direction: column;
        text-align: center;
      }
      .hero-text h1 {
        font-size: 2rem;
      }
      .banner {
        width: 95%;
        padding: 25px;
      }
      .banner h2 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header>
    <div class="logo">E-BPHTB</div>
    <div class="nav-buttons">
      <button class="login" onclick="window.location.href='login.html'">Masuk</button>
      <button class="register" onclick="window.location.href='registrasi.html'">Registrasi</button>
    </div>
  </header>
    <!-- Banner / Notice -->  

  <!-- Hero Section -->
  <section class="hero">
    <img src="asset/Tax-amico.png" alt="Ilustrasi Pajak" />
    <div class="hero-text">
      <h1>Selamat Datang di E-BPHTB Kabupaten Bogor</h1>
      <p>Layanan resmi Bea Perolehan Hak atas Tanah dan Bangunan secara digital, cepat, dan transparan.</p>
      <button class="cta" onclick="window.location.href='public-validasi-qr.html'">Cek Keaslian Dokumen</button>
    </div>
  </section>



  <!-- Footer -->
  <footer>
    © 2025 Pemerintah Kabupaten Bogor – BAPPENDA
  </footer>
</body>
</html>
