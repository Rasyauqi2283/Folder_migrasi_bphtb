<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin| Pemutakhiran Data Pengguna PPAT</title>
  <link rel="icon" href="../../../asset/TitleE-bphtb.png" type="image/png">
  <link rel="stylesheet" href="../../../design-n-script/design_css/design_table/design_untukppat-pemutakhiran.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* Pagination Styles - from hasil_transaksi.html */
    .pagination-container {
      margin-top: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(81, 81, 95, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    
    .pagination-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .page-btn {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
    }
    
    .page-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    .page-btn:disabled {
      background: rgba(81, 81, 95, 0.3);
      color: #9ca3af;
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    .page-numbers {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .page-number {
      background: rgba(255, 255, 255, 0.8);
      color: #374151;
      border: 1px solid rgba(81, 81, 95, 0.3);
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 40px;
      text-align: center;
      font-size: 14px;
    }
    
    .page-number:hover:not(.active) {
      background: rgba(59, 130, 246, 0.1);
      border-color: #3b82f6;
      color: #3b82f6;
    }
    
    .page-number.active {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border-color: #3b82f6;
      box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
    }
    
    .page-ellipsis {
      color: #6b7280;
      padding: 8px 4px;
      font-weight: 600;
    }
    
    .page-info {
      color: #374151;
      font-size: 13px;
      font-weight: 500;
      margin-left: 12px;
      padding: 8px 12px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 8px;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }
    
    @media (max-width: 768px) {
      .pagination-controls {
        flex-direction: column;
        gap: 12px;
      }
      
      .page-info {
        margin-left: 0;
        text-align: center;
        width: 100%;
      }
    }
  </style>
</head>
<body>
<main id="pemutakhiranppat_design" class="main-content">
  <div class="page-container">

    <!-- BAGIAN PROFIL -->
    <div class="profile-section">
      <button class="back-btn" onclick="window.history.back()">←</button>
  
      <div class="profile-header">
        <div class="profile-image">
          <span><img id="fotoProfil" src="/default-profile.png" alt="Foto Profil" /></span> <!-- gambar profile diambil dari tabel a_2_verified_users dari kolom tabel gambar_profile -->
        </div>
  
        <div class="profile-info">
          <div class="info-row">
            <label>Nama Panjang</label>
            <span id="namaPanjang">-</span> <!-- a_2_verified_users.nama -->
          </div>
          <div class="info-row">
            <label>Nama + Title</label>
            <span id="namaTitle">-</span> <!-- a_2_verified_users.special_field -->
          </div>
          <div class="info-row">
            <label>PPAT Khusus</label>
                <span id="ppatKhusus">-</span> <!-- a_2_verified_users.ppat_khusus -->
          </div>
          <div class="info-row">
            <label>Pejabat</label>
            <span id="pejabatUmum">-</span> <!-- a_2_verified_users.pejabat_umum -->
          </div>
        </div>
  
        <div class="profile-extra">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari..." />
          </div>
          <div class="extra-box">
            booking yang dikerjakan: <span id="field-booking-count">0</span>
          </div>
          <div class="extra-box">
            Nilai Pajak Total<br>
            <small id="field-total-nilai">-</small>
          </div>
        </div>
      </div>
    </div>
  
    <!-- BAGIAN TABEL -->
    <div class="table-section">
      <table class="rekap-table">
        <thead>
          <tr>
            <th>NoBooking</th>
            <th>Tanggal</th>
            <th>UserId</th>
            <th>NOPPBB</th>
            <th>Jenis Pajak</th>
            <th>Nilai Pajak</th>
            <th>Nama WP</th>
          </tr>
        </thead>
          <tbody id="bookingBody">
          <tr><td colspan="7" class="empty-message">Memuat data...</td></tr>
          </tbody>
      </table>
  
      <div class="pagination-container" id="paginationContainer">
        <!-- Pagination akan di-generate oleh JavaScript -->
      </div>
    </div>
  
  </div>
  
</main>
<script>
document.addEventListener('DOMContentLoaded', async function() {
  const params = new URLSearchParams(window.location.search);
  const useridParam = (params.get('userid') || '').trim();

  // Global variables for pagination and search
  let currentPage = 1;
  let currentLimit = 10;
  let currentSearch = '';
  let allBookings = [];
  let filteredBookings = [];
  let totalPages = 1;
  let totalRecords = 0;

  function createCell(text) {
    const td = document.createElement('td');
    td.textContent = text;
    return td;
  }

  function renderUserInfo(user) {
    document.getElementById('namaPanjang').textContent = user.nama || '-';
    document.getElementById('namaTitle').textContent = user.special_field || '-';
    document.getElementById('ppatKhusus').textContent = user.ppat_khusus || '-';
    document.getElementById('pejabatUmum').textContent = user.pejabat_umum || '-';

    const img = document.getElementById('fotoProfil');
    if (img) {
      img.src = user.fotoprofil || '/default-profile.png';
      img.onerror = function() { this.src = '/default-profile.png'; };
    }
  }

  function renderSummary(summary) {
    document.getElementById('field-booking-count').textContent = summary.total_booking || 0;
    document.getElementById('field-total-nilai').textContent =
      'Rp ' + Number(summary.total_nilai || 0).toLocaleString('id-ID');
  }

  function filterBookings() {
    if (!currentSearch.trim()) {
      filteredBookings = [...allBookings];
    } else {
      const searchLower = currentSearch.toLowerCase();
      filteredBookings = allBookings.filter(booking => {
        return (
          (booking.nobooking || '').toLowerCase().includes(searchLower) ||
          (booking.noppbb || '').toLowerCase().includes(searchLower) ||
          (booking.namawajibpajak || '').toLowerCase().includes(searchLower) ||
          (booking.jenis_wajib_pajak || '').toLowerCase().includes(searchLower)
        );
      });
    }
    // Update pagination info
    totalRecords = filteredBookings.length;
    totalPages = Math.ceil(totalRecords / currentLimit);
    currentPage = 1; // Reset to first page when filtering
    renderTable();
    renderPagination();
  }

  function renderTable() {
    const body = document.getElementById('bookingBody');
    body.innerHTML = '';

    const startIndex = (currentPage - 1) * currentLimit;
    const endIndex = startIndex + currentLimit;
    const pageData = filteredBookings.slice(startIndex, endIndex);

    if (pageData.length === 0) {
      body.innerHTML = '<tr><td colspan="7" class="empty-message">Tidak ada data booking</td></tr>';
      return;
    }

    pageData.forEach((r) => {
      const tr = document.createElement('tr');
      tr.appendChild(createCell(r.nobooking || '-'));
      tr.appendChild(createCell(r.tanggal ? r.tanggal.split('T')[0] : '-'));
      tr.appendChild(createCell(useridParam || '-'));
      tr.appendChild(createCell(r.noppbb || '-'));
      tr.appendChild(createCell(r.jenis_wajib_pajak || '-'));
      tr.appendChild(createCell('Rp ' + Number(r.bphtb_yangtelah_dibayar || 0).toLocaleString('id-ID')));
      tr.appendChild(createCell(r.namawajibpajak || '-'));

      body.appendChild(tr);
    });
  }

  function renderPagination() {
    const container = document.getElementById('paginationContainer');
    if (!container) {
      console.warn('⚠️ [PPAT-DETAIL] Pagination container not found!');
      return;
    }
    
    container.innerHTML = '';
    
    // Calculate total pages
    totalPages = Math.ceil(filteredBookings.length / currentLimit);
    totalRecords = filteredBookings.length;
    
    // Only show pagination if we have more than one page
    if (totalPages <= 1) {
      return;
    }
    
    console.log('📄 [PPAT-DETAIL] Rendering pagination:', {
      totalPages,
      currentPage,
      totalRecords,
      rowCount: filteredBookings.length
    });
    
    const pagination = document.createElement('div');
    pagination.className = 'pagination-controls';
    pagination.innerHTML = `
      <button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPagePPAT(${currentPage - 1})">
        <i class="fa fa-chevron-left"></i> Prev
      </button>
      <div class="page-numbers">
        ${generatePageNumbersPPAT(totalPages)}
      </div>
      <button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} onclick="goToPagePPAT(${currentPage + 1})">
        Next <i class="fa fa-chevron-right"></i>
      </button>
      <div class="page-info">
        Halaman ${currentPage} dari ${totalPages}${totalRecords > 0 ? ` (Total: ${totalRecords} data)` : ''}
      </div>
    `;
    
    container.appendChild(pagination);
  }
  
  function generatePageNumbersPPAT(maxPages) {
    let pages = [];
    const maxVisible = 5; // Maximum visible page numbers
    const effectiveTotalPages = Math.max(maxPages, totalPages, currentPage);
    
    if (effectiveTotalPages <= maxVisible) {
      // Show all pages if total pages is small
      for (let i = 1; i <= effectiveTotalPages; i++) {
        pages.push(i);
      }
    } else {
      // Show pages with ellipsis
      if (currentPage <= 3) {
        // Show first pages
        for (let i = 1; i <= 4; i++) {
          pages.push(i);
        }
        pages.push('ellipsis');
        pages.push(effectiveTotalPages);
      } else if (currentPage >= effectiveTotalPages - 2) {
        // Show last pages
        pages.push(1);
        pages.push('ellipsis');
        for (let i = effectiveTotalPages - 3; i <= effectiveTotalPages; i++) {
          pages.push(i);
        }
      } else {
        // Show middle pages
        pages.push(1);
        pages.push('ellipsis');
        for (let i = currentPage - 1; i <= currentPage + 1; i++) {
          pages.push(i);
        }
        pages.push('ellipsis');
        pages.push(effectiveTotalPages);
      }
    }
    
    return pages.map(page => {
      if (page === 'ellipsis') {
        return '<span class="page-ellipsis">...</span>';
      }
      const isActive = page === currentPage;
      return `<button class="page-number ${isActive ? 'active' : ''}" onclick="goToPagePPAT(${page})">${page}</button>`;
    }).join('');
  }
  
  function goToPagePPAT(page) {
    if (page < 1 || page === currentPage) return;
    if (totalPages > 0 && page > totalPages) {
      console.warn('⚠️ [PPAT-DETAIL] Page exceeds totalPages, but allowing navigation');
    }
    currentPage = page;
    renderTable();
    renderPagination();
    // Scroll to top of table
    const table = document.querySelector('.table-section');
    if (table) {
      table.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
  
  // Make goToPagePPAT globally available
  window.goToPagePPAT = goToPagePPAT;

  async function loadUserBookings(userid) {
    const body = document.getElementById('bookingBody');
    body.innerHTML = '<tr><td colspan="7" class="empty-message">Memuat data...</td></tr>';

    try {
      const res = await fetch(`/api/admin/ppat/user/${encodeURIComponent(userid)}/diserahkan`, { credentials: 'include' });
      const js = await res.json();
      console.log("Hasil fetch:", js);

      if (!res.ok || !js.success) {
        body.innerHTML = '<tr><td colspan="7">User tidak ditemukan atau data kosong</td></tr>';
        return;
      }

      if (js.user) {
        renderUserInfo(js.user);
      }

      if (js.summary) {
        renderSummary(js.summary);
      }

      const rows = Array.isArray(js.rows) ? js.rows : [];
      allBookings = rows;
      filteredBookings = [...allBookings];
      
      // Update pagination info
      totalRecords = filteredBookings.length;
      totalPages = Math.ceil(totalRecords / currentLimit);
      currentPage = 1; // Reset to first page on initial load
      
      // Initialize search
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => {
            currentSearch = e.target.value.trim();
            currentPage = 1; // Reset to first page when searching
            filterBookings();
          }, 300);
        });
      }

      renderTable();
      renderPagination();

    } catch (err) {
      console.error('Gagal fetch:', err);
      body.innerHTML = `<tr><td colspan="7">Gagal memuat data: ${err.message}</td></tr>`;
    }
  }

  if (useridParam) {
    await loadUserBookings(useridParam);
  } else {
    document.getElementById('bookingBody').innerHTML =
      '<tr><td colspan="7">UserId tidak diberikan di URL</td></tr>';
  }
});
</script>
<script type="module">
  import { initNotifications } from '../../../design-n-script/script-backend/notification-setup.js';
  initNotifications();
</script>
</body>
</html>
