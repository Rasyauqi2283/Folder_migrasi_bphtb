services:
  easyocr:
    build:
      context: ./ocr-easy-service
    container_name: ebphtb-easyocr
    ports:
      - "8010:8010"
    environment:
      EASYOCR_GPU: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
